<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Readers - Uni Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-nav"></div>

    <div class="container py-4">
      <div class="page-title">
        <div>
          <h4><i class="bi bi-person-vcard me-1"></i> Readers</h4>
          <p class="page-subtitle">Create and manage library cards</p>
        </div>
        <div class="pill">
          <i class="bi bi-search"></i>
          <input id="q" class="form-control form-control-sm border-0 bg-transparent p-0" style="width:220px" placeholder="Search name/class..." />
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-7">
          <div class="card card-hover">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Reader List</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">Refresh</button>
              </div>
              <div id="msg" class="mt-3"></div>
              <div class="table-responsive mt-2">
                <table class="table table-striped table-sm">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                      <th>Class</th>
                      <th>Birth Date</th>
                      <th>Gender</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="rows"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card card-hover">
            <div class="card-body">
              <h5 id="formTitle"><i class="bi bi-plus-circle me-1"></i> Add Reader</h5>
              <form id="form" class="mt-3">
                <input type="hidden" name="reader_id" />
                <div class="mb-2">
                  <label class="form-label">Name</label>
                  <input class="form-control" name="name" required />
                </div>
                <div class="mb-2">
                  <label class="form-label">Class</label>
                  <input class="form-control" name="class" required />
                </div>
                <div class="mb-2">
                  <label class="form-label">Birth date</label>
                  <input class="form-control" name="birth_date" type="date" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Gender</label>
                  <select class="form-select" name="gender" required>
                    <option value="male">male</option>
                    <option value="female">female</option>
                    <option value="other">other</option>
                  </select>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-primary" type="submit">Save</button>
                  <button class="btn btn-outline-secondary" type="button" id="resetBtn">Reset</button>
                </div>
              </form>
              <p class="form-text mt-3 mb-0">Tip: click <b>Edit</b> in the table to update a reader.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { apiFetch } from "./assets/api.js";
      import { renderNav, requireAuth, showError, showSuccess, escapeHtml } from "./assets/common.js";

      if (!requireAuth()) throw new Error("no auth");
      renderNav("readers");

      const rows = document.getElementById("rows");
      const msg = document.getElementById("msg");
      const form = document.getElementById("form");
      const formTitle = document.getElementById("formTitle");
      const q = document.getElementById("q");
      let cache = [];

      function resetForm() {
        form.reset();
        form.reader_id.value = "";
        formTitle.innerHTML = `<i class="bi bi-plus-circle me-1"></i> Add Reader`;
      }

      function render(list) {
        rows.innerHTML = list
          .map((r) => {
            return `<tr>
              <td>${r.reader_id}</td>
              <td>${escapeHtml(r.name)}</td>
              <td>${escapeHtml(r["class"])}</td>
              <td>${r.birth_date}</td>
              <td>${escapeHtml(r.gender)}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-primary" data-edit="${r.reader_id}"><i class="bi bi-pencil-square"></i></button>
                <button class="btn btn-sm btn-outline-danger ms-1" data-del="${r.reader_id}"><i class="bi bi-trash"></i></button>
              </td>
            </tr>`;
          })
          .join("");
      }

      async function load() {
        msg.innerHTML = "";
        cache = await apiFetch("/readers");
        render(cache);
      }

      document.getElementById("refreshBtn").addEventListener("click", () => load().catch((e) => showError(msg, e.message)));
      document.getElementById("resetBtn").addEventListener("click", resetForm);

      rows.addEventListener("click", async (e) => {
        const editId = e.target?.dataset?.edit;
        const delId = e.target?.dataset?.del;
        if (editId) {
          const r = await apiFetch(`/readers/${editId}`);
          form.reader_id.value = r.reader_id;
          form.name.value = r.name;
          form["class"].value = r["class"];
          form.birth_date.value = r.birth_date;
          form.gender.value = r.gender;
          formTitle.innerHTML = `<i class="bi bi-pencil-square me-1"></i> Edit Reader #${r.reader_id}`;
        }
        if (delId) {
          if (!confirm("Delete this reader?")) return;
          await apiFetch(`/readers/${delId}`, { method: "DELETE" });
          showSuccess(msg, "Deleted.");
          resetForm();
          await load();
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.innerHTML = "";
        const body = Object.fromEntries(new FormData(form).entries());
        const id = body.reader_id;
        delete body.reader_id;
        try {
          if (id) await apiFetch(`/readers/${id}`, { method: "PUT", body });
          else await apiFetch("/readers", { method: "POST", body });
          showSuccess(msg, "Saved.");
          resetForm();
          await load();
        } catch (err) {
          showError(msg, err.message);
        }
      });

      q.addEventListener("input", () => {
        const s = q.value.trim().toLowerCase();
        if (!s) return render(cache);
        render(cache.filter(r => (r.name + " " + r["class"]).toLowerCase().includes(s)));
      });

      load().catch((e) => showError(msg, e.message));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
