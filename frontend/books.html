<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Books - Uni Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-nav"></div>

    <div class="container py-4">
      <div class="page-title">
        <div>
          <h4><i class="bi bi-book me-1"></i> Books</h4>
          <p class="page-subtitle">Majors, titles, and physical copies</p>
        </div>
        <div class="pill"><i class="bi bi-info-circle"></i> Create Major → Title → Copy</div>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card card-hover">
            <div class="card-body">
              <h5 class="mb-3"><i class="bi bi-tags me-1"></i> Majors (Categories)</h5>
              <div id="majorMsg"></div>
              <form id="majorForm" class="mb-3">
                <input type="hidden" name="major_id" />
                <input class="form-control mb-2" name="major_name" placeholder="Major name" required />
                <input class="form-control mb-2" name="description" placeholder="Description" />
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-primary" type="submit">Save</button>
                  <button class="btn btn-sm btn-outline-secondary" type="button" id="majorReset">Reset</button>
                </div>
              </form>
              <div class="table-responsive">
                <table class="table table-sm table-striped">
                  <thead><tr><th>ID</th><th>Name</th><th></th></tr></thead>
                  <tbody id="majorRows"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card card-hover mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-journal-bookmark me-1"></i> Book Titles</h5>
                <button class="btn btn-sm btn-outline-secondary" id="titleRefresh">Refresh</button>
              </div>
              <div id="titleMsg" class="mt-3"></div>
              <form id="titleForm" class="row g-2 mt-1">
                <input type="hidden" name="title_id" />
                <div class="col-md-6"><input class="form-control" name="title_name" placeholder="Title name" required /></div>
                <div class="col-md-6"><input class="form-control" name="author" placeholder="Author" required /></div>
                <div class="col-md-4"><input class="form-control" name="publisher" placeholder="Publisher" required /></div>
                <div class="col-md-2"><input class="form-control" name="pages" type="number" min="1" placeholder="Pages" required /></div>
                <div class="col-md-2"><input class="form-control" name="size" placeholder="Size (e.g. A5)" required /></div>
                <div class="col-md-4">
                  <select class="form-select" name="major_id" required id="majorSelect"></select>
                </div>
                <div class="col-12 d-flex gap-2">
                  <button class="btn btn-primary btn-sm" type="submit">Save Title</button>
                  <button class="btn btn-outline-secondary btn-sm" type="button" id="titleReset">Reset</button>
                </div>
              </form>

              <div class="table-responsive mt-3">
                <table class="table table-sm table-striped">
                  <thead>
                    <tr>
                      <th>ID</th><th>Title</th><th>Author</th><th>Major</th><th>Total</th><th></th>
                    </tr>
                  </thead>
                  <tbody id="titleRows"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="card card-hover">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-stack me-1"></i> Book Copies</h5>
                <button class="btn btn-sm btn-outline-secondary" id="copyRefresh">Refresh</button>
              </div>
              <div id="copyMsg" class="mt-3"></div>
              <form id="copyForm" class="row g-2 mt-1">
                <input type="hidden" name="copy_id" />
                <div class="col-md-6">
                  <select class="form-select" name="title_id" required id="titleSelect"></select>
                </div>
                <div class="col-md-3">
                  <select class="form-select" name="status" required>
                    <option value="available">available</option>
                    <option value="borrowed">borrowed</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <input class="form-control" name="import_date" type="date" required />
                </div>
                <div class="col-12 d-flex gap-2">
                  <button class="btn btn-primary btn-sm" type="submit">Save Copy</button>
                  <button class="btn btn-outline-secondary btn-sm" type="button" id="copyReset">Reset</button>
                </div>
              </form>
              <div class="table-responsive mt-3">
                <table class="table table-sm table-striped">
                  <thead><tr><th>ID</th><th>Title ID</th><th>Status</th><th>Import</th><th></th></tr></thead>
                  <tbody id="copyRows"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { apiFetch } from "./assets/api.js";
      import { renderNav, requireAuth, showError, showSuccess, escapeHtml } from "./assets/common.js";

      if (!requireAuth()) throw new Error("no auth");
      renderNav("books");

      const majorRows = document.getElementById("majorRows");
      const majorMsg = document.getElementById("majorMsg");
      const majorForm = document.getElementById("majorForm");
      const majorSelect = document.getElementById("majorSelect");

      const titleRows = document.getElementById("titleRows");
      const titleMsg = document.getElementById("titleMsg");
      const titleForm = document.getElementById("titleForm");
      const titleSelect = document.getElementById("titleSelect");

      const copyRows = document.getElementById("copyRows");
      const copyMsg = document.getElementById("copyMsg");
      const copyForm = document.getElementById("copyForm");

      let majors = [];
      let titles = [];

      function resetMajor() { majorForm.reset(); majorForm.major_id.value = ""; }
      function resetTitle() { titleForm.reset(); titleForm.title_id.value = ""; }
      function resetCopy() { copyForm.reset(); copyForm.copy_id.value = ""; }

      async function loadMajors() {
        majors = await apiFetch("/majors");
        majorRows.innerHTML = majors.map(m => `
          <tr>
            <td>${m.major_id}</td>
            <td>${escapeHtml(m.major_name)}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary" data-me="${m.major_id}">Edit</button>
              <button class="btn btn-sm btn-outline-danger ms-1" data-md="${m.major_id}">Delete</button>
            </td>
          </tr>`).join("");
        majorSelect.innerHTML = majors.map(m => `<option value="${m.major_id}">${escapeHtml(m.major_name)}</option>`).join("");
      }

      async function loadTitles() {
        titles = await apiFetch("/titles");
        const majorName = (id) => majors.find(m => m.major_id === id)?.major_name || `#${id}`;
        titleRows.innerHTML = titles.map(t => `
          <tr>
            <td>${t.title_id}</td>
            <td>${escapeHtml(t.title_name)}</td>
            <td>${escapeHtml(t.author)}</td>
            <td>${escapeHtml(majorName(t.major_id))}</td>
            <td>${t.total_quantity}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary" data-te="${t.title_id}">Edit</button>
              <button class="btn btn-sm btn-outline-danger ms-1" data-td="${t.title_id}">Delete</button>
            </td>
          </tr>`).join("");
        titleSelect.innerHTML = titles.map(t => `<option value="${t.title_id}">#${t.title_id} - ${escapeHtml(t.title_name)}</option>`).join("");
      }

      async function loadCopies() {
        const copies = await apiFetch("/copies");
        copyRows.innerHTML = copies.map(c => `
          <tr>
            <td>${c.copy_id}</td>
            <td>${c.title_id}</td>
            <td>${escapeHtml(c.status)}</td>
            <td>${c.import_date}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary" data-ce="${c.copy_id}">Edit</button>
              <button class="btn btn-sm btn-outline-danger ms-1" data-cd="${c.copy_id}">Delete</button>
            </td>
          </tr>`).join("");
      }

      async function loadAll() {
        await loadMajors();
        await loadTitles();
        await loadCopies();
      }

      document.getElementById("majorReset").addEventListener("click", resetMajor);
      document.getElementById("titleReset").addEventListener("click", resetTitle);
      document.getElementById("copyReset").addEventListener("click", resetCopy);
      document.getElementById("titleRefresh").addEventListener("click", () => loadAll().catch(e => showError(titleMsg, e.message)));
      document.getElementById("copyRefresh").addEventListener("click", () => loadAll().catch(e => showError(copyMsg, e.message)));

      majorRows.addEventListener("click", async (e) => {
        const idE = e.target?.dataset?.me;
        const idD = e.target?.dataset?.md;
        if (idE) {
          const m = majors.find(x => x.major_id == idE);
          majorForm.major_id.value = m.major_id;
          majorForm.major_name.value = m.major_name;
          majorForm.description.value = m.description || "";
        }
        if (idD) {
          if (!confirm("Delete this major? (must not be used by titles)")) return;
          await apiFetch(`/majors/${idD}`, { method: "DELETE" });
          showSuccess(majorMsg, "Deleted.");
          resetMajor();
          await loadAll();
        }
      });

      titleRows.addEventListener("click", async (e) => {
        const idE = e.target?.dataset?.te;
        const idD = e.target?.dataset?.td;
        if (idE) {
          const t = titles.find(x => x.title_id == idE);
          titleForm.title_id.value = t.title_id;
          titleForm.title_name.value = t.title_name;
          titleForm.author.value = t.author;
          titleForm.publisher.value = t.publisher;
          titleForm.pages.value = t.pages;
          titleForm.size.value = t.size;
          titleForm.major_id.value = t.major_id;
        }
        if (idD) {
          if (!confirm("Delete this title and all its copies?")) return;
          await apiFetch(`/titles/${idD}`, { method: "DELETE" });
          showSuccess(titleMsg, "Deleted.");
          resetTitle();
          await loadAll();
        }
      });

      copyRows.addEventListener("click", async (e) => {
        const idE = e.target?.dataset?.ce;
        const idD = e.target?.dataset?.cd;
        if (idE) {
          const c = await apiFetch(`/copies/${idE}`);
          copyForm.copy_id.value = c.copy_id;
          copyForm.title_id.value = c.title_id;
          copyForm.status.value = c.status;
          copyForm.import_date.value = c.import_date;
        }
        if (idD) {
          if (!confirm("Delete this copy?")) return;
          await apiFetch(`/copies/${idD}`, { method: "DELETE" });
          showSuccess(copyMsg, "Deleted.");
          resetCopy();
          await loadAll();
        }
      });

      majorForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        majorMsg.innerHTML = "";
        const body = Object.fromEntries(new FormData(majorForm).entries());
        const id = body.major_id;
        delete body.major_id;
        try {
          if (id) await apiFetch(`/majors/${id}`, { method: "PUT", body });
          else await apiFetch("/majors", { method: "POST", body });
          showSuccess(majorMsg, "Saved.");
          resetMajor();
          await loadAll();
        } catch (err) { showError(majorMsg, err.message); }
      });

      titleForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        titleMsg.innerHTML = "";
        const body = Object.fromEntries(new FormData(titleForm).entries());
        body.pages = Number(body.pages);
        body.major_id = Number(body.major_id);
        const id = body.title_id;
        delete body.title_id;
        try {
          if (id) await apiFetch(`/titles/${id}`, { method: "PUT", body });
          else await apiFetch("/titles", { method: "POST", body });
          showSuccess(titleMsg, "Saved.");
          resetTitle();
          await loadAll();
        } catch (err) { showError(titleMsg, err.message); }
      });

      copyForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        copyMsg.innerHTML = "";
        const body = Object.fromEntries(new FormData(copyForm).entries());
        body.title_id = Number(body.title_id);
        const id = body.copy_id;
        delete body.copy_id;
        try {
          if (id) await apiFetch(`/copies/${id}`, { method: "PUT", body });
          else await apiFetch("/copies", { method: "POST", body });
          showSuccess(copyMsg, "Saved.");
          resetCopy();
          await loadAll();
        } catch (err) { showError(copyMsg, err.message); }
      });

      loadAll().catch((e) => showError(titleMsg, e.message));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
