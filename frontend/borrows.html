<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Borrow / Return - Uni Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-nav"></div>

    <div class="container py-4">
      <div class="page-title">
        <div>
          <h4><i class="bi bi-arrow-left-right me-1"></i> Borrow / Return</h4>
          <p class="page-subtitle">One active borrow per reader (MVP rule)</p>
        </div>
        <div class="pill"><i class="bi bi-shield-check"></i> Enforced by backend</div>
      </div>

      <div class="row g-3">
        <div class="col-lg-5">
          <div class="card card-hover">
            <div class="card-body">
              <h5><i class="bi bi-box-arrow-in-right me-1"></i> Borrow Book</h5>
              <div id="borrowMsg" class="mt-3"></div>
              <form id="borrowForm" class="mt-2">
                <div class="mb-2">
                  <label class="form-label">Reader</label>
                  <select class="form-select" name="reader_id" id="readerSelect" required></select>
                </div>
                <div class="mb-2">
                  <label class="form-label">Copy (must be available)</label>
                  <select class="form-select" name="copy_id" id="copySelect" required></select>
                  <div class="form-text">Tip: create copies in Books page first.</div>
                </div>
                <button class="btn btn-primary" type="submit">Borrow</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card card-hover">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-receipt me-1"></i> Borrow Records</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">Refresh</button>
              </div>
              <div id="listMsg" class="mt-3"></div>
              <div class="table-responsive mt-2">
                <table class="table table-sm table-striped">
                  <thead>
                    <tr>
                      <th>ID</th><th>Reader</th><th>Copy</th><th>Status</th><th>Borrowed</th><th></th>
                    </tr>
                  </thead>
                  <tbody id="rows"></tbody>
                </table>
              </div>
              <p class="form-text mb-0">Return action is available only for <code>borrowed</code> records.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { apiFetch } from "./assets/api.js";
      import { renderNav, requireAuth, showError, showSuccess, escapeHtml } from "./assets/common.js";

      if (!requireAuth()) throw new Error("no auth");
      renderNav("borrows");

      const borrowMsg = document.getElementById("borrowMsg");
      const listMsg = document.getElementById("listMsg");
      const rows = document.getElementById("rows");
      const borrowForm = document.getElementById("borrowForm");
      const readerSelect = document.getElementById("readerSelect");
      const copySelect = document.getElementById("copySelect");

      let readers = [];
      let copies = [];

      async function loadPickers() {
        readers = await apiFetch("/readers");
        copies = await apiFetch("/copies");
        readerSelect.innerHTML = readers
          .map((r) => `<option value="${r.reader_id}">#${r.reader_id} - ${escapeHtml(r.name)} (${escapeHtml(r["class"])})</option>`)
          .join("");
        copySelect.innerHTML = copies
          .filter((c) => c.status === "available")
          .map((c) => `<option value="${c.copy_id}">Copy #${c.copy_id} (Title #${c.title_id})</option>`)
          .join("");
      }

      async function loadList() {
        const borrows = await apiFetch("/borrows");
        rows.innerHTML = borrows
          .map((b) => {
            const reader = readers.find((r) => r.reader_id === b.reader_id);
            const readerLabel = reader ? `${reader.name} (#${reader.reader_id})` : `#${b.reader_id}`;
            const btn =
              b.status === "borrowed"
                ? `<button class="btn btn-sm btn-outline-success" data-ret="${b.borrow_id}">Return</button>`
                : "";
            return `<tr>
              <td>${b.borrow_id}</td>
              <td>${escapeHtml(readerLabel)}</td>
              <td>#${b.copy_id}</td>
              <td>${escapeHtml(b.status)}</td>
              <td class="small">${escapeHtml(new Date(b.borrow_date).toLocaleString())}</td>
              <td class="text-end">${btn}</td>
            </tr>`;
          })
          .join("");
      }

      async function refreshAll() {
        await loadPickers();
        await loadList();
      }

      document.getElementById("refreshBtn").addEventListener("click", () => refreshAll().catch((e) => showError(listMsg, e.message)));

      borrowForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        borrowMsg.innerHTML = "";
        const body = Object.fromEntries(new FormData(borrowForm).entries());
        body.reader_id = Number(body.reader_id);
        body.copy_id = Number(body.copy_id);
        try {
          await apiFetch("/borrows/borrow", { method: "POST", body });
          showSuccess(borrowMsg, "Borrowed successfully.");
          await refreshAll();
        } catch (err) {
          showError(borrowMsg, err.message);
        }
      });

      rows.addEventListener("click", async (e) => {
        const id = e.target?.dataset?.ret;
        if (!id) return;
        if (!confirm("Return this book?")) return;
        listMsg.innerHTML = "";
        try {
          await apiFetch("/borrows/return", { method: "POST", body: { borrow_id: Number(id) } });
          showSuccess(listMsg, "Returned.");
          await refreshAll();
        } catch (err) {
          showError(listMsg, err.message);
        }
      });

      refreshAll().catch((e) => showError(listMsg, e.message));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
