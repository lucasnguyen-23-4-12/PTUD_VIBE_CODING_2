<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports - Uni Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-nav"></div>

    <div class="container py-4">
      <div class="page-title">
        <div>
          <h4><i class="bi bi-graph-up me-1"></i> Reports</h4>
          <p class="page-subtitle">Operational insights for librarians</p>
        </div>
        <div class="pill"><i class="bi bi-lightbulb"></i> Borrow more to see ranking</div>
      </div>

      <div class="row g-3">
        <div class="col-lg-5">
          <div class="card card-hover">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-trophy me-1"></i> Most Borrowed Titles</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refresh1">Refresh</button>
              </div>
              <div id="msg1" class="mt-3"></div>
              <div class="table-responsive mt-2">
                <table class="table table-sm table-striped">
                  <thead><tr><th>Title</th><th class="text-end">Count</th></tr></thead>
                  <tbody id="rows1"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card card-hover">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-exclamation-circle me-1"></i> Readers With Unreturned Books</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refresh2">Refresh</button>
              </div>
              <div id="msg2" class="mt-3"></div>
              <div class="table-responsive mt-2">
                <table class="table table-sm table-striped">
                  <thead>
                    <tr><th>Reader</th><th>Class</th><th>Title</th><th>Copy</th><th>Borrowed</th></tr>
                  </thead>
                  <tbody id="rows2"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { apiFetch } from "./assets/api.js";
      import { renderNav, requireAuth, showError, escapeHtml } from "./assets/common.js";

      if (!requireAuth()) throw new Error("no auth");
      renderNav("reports");

      const msg1 = document.getElementById("msg1");
      const msg2 = document.getElementById("msg2");
      const rows1 = document.getElementById("rows1");
      const rows2 = document.getElementById("rows2");

      async function loadMostBorrowed() {
        msg1.innerHTML = "";
        const data = await apiFetch("/reports/most-borrowed");
        rows1.innerHTML = data
          .map((r) => `<tr><td>${escapeHtml(r.title_name)} (#${r.title_id})</td><td class="text-end">${r.borrow_count}</td></tr>`)
          .join("");
      }

      async function loadUnreturned() {
        msg2.innerHTML = "";
        const data = await apiFetch("/reports/unreturned-readers");
        rows2.innerHTML = data
          .map((r) => `<tr>
            <td>${escapeHtml(r.name)} (#${r.reader_id})</td>
            <td>${escapeHtml(r["class"])}</td>
            <td>${escapeHtml(r.title_name)} (#${r.title_id})</td>
            <td>#${r.copy_id}</td>
            <td class="small">${escapeHtml(new Date(r.borrow_date).toLocaleString())}</td>
          </tr>`)
          .join("");
      }

      document.getElementById("refresh1").addEventListener("click", () => loadMostBorrowed().catch((e) => showError(msg1, e.message)));
      document.getElementById("refresh2").addEventListener("click", () => loadUnreturned().catch((e) => showError(msg2, e.message)));

      loadMostBorrowed().catch((e) => showError(msg1, e.message));
      loadUnreturned().catch((e) => showError(msg2, e.message));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
