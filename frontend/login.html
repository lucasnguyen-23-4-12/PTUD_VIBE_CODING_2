<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Uni Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-5" style="max-width: 980px">
      <div class="row g-4 align-items-center">
        <div class="col-lg-6">
          <div class="p-4">
            <div class="pill mb-3"><i class="bi bi-book"></i> Library Management System</div>
            <h1 class="display-6 fw-bold mb-2">University Library</h1>
            <p class="page-subtitle mb-4">Simple MVP for managing readers, books, borrowing/returning, and reports.</p>
            <div class="d-flex gap-2 flex-wrap">
              <div class="pill"><i class="bi bi-shield-lock"></i> Role-based admin</div>
              <div class="pill"><i class="bi bi-arrow-repeat"></i> Borrow/Return flow</div>
              <div class="pill"><i class="bi bi-graph-up"></i> Reports</div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
      <div class="card card-hover">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <h3 class="mb-1">Sign in</h3>
              <p class="text-muted mb-0">Default: <code>admin</code> / <code>admin</code></p>
            </div>
            <button class="btn btn-outline-secondary btn-sm" id="themeBtn" title="Toggle theme">
              <i class="bi bi-moon-stars"></i>
            </button>
          </div>

          <div id="msg"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input class="form-control" name="username" required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input class="form-control" type="password" name="password" required />
              </div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
        </div>
      </div>
      <p class="text-center footer-note mt-3 mb-0">Backend must be running at <code>http://127.0.0.1:8000</code></p>
        </div>
      </div>
    </div>

    <script type="module">
      import { apiFetch, setSession } from "./assets/api.js";
      import { initTheme, showError, showSuccess } from "./assets/common.js";

      initTheme();
      const form = document.getElementById("loginForm");
      const msg = document.getElementById("msg");
      const themeBtn = document.getElementById("themeBtn");

      if (themeBtn) {
        const icon = themeBtn.querySelector("i");
        const syncIcon = () => {
          const t = document.documentElement.getAttribute("data-bs-theme") || "light";
          icon.className = t === "dark" ? "bi bi-sun" : "bi bi-moon-stars";
        };
        syncIcon();
        themeBtn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-bs-theme") || "light";
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-bs-theme", next);
          localStorage.setItem("theme", next);
          syncIcon();
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.innerHTML = "";
        const body = Object.fromEntries(new FormData(form).entries());
        try {
          const data = await apiFetch("/auth/login", { method: "POST", body });
          setSession(data);
          showSuccess(msg, "Login successful. Redirecting...");
          setTimeout(() => (window.location.href = "dashboard.html"), 300);
        } catch (err) {
          showError(msg, err.message);
        }
      });
    </script>
  </body>
</html>
